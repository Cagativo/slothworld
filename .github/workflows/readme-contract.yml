name: README Architecture Contract

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  readme-contract:
    name: .github/workflows/readme-contract.yml
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run README architecture contract
        run: npm run test:readme-contract