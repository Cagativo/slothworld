name: Invariant Enforcement

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  enforcement-tests:
    name: .github/workflows/invariant-enforcement.yml
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run invariant enforcement tests
        run: npm run test:enforcement
